[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.zip",
  "php83Extensions.gd",
  "php83Extensions.intl",
  "php83Extensions.fileinfo",
  "php83Extensions.curl",
  "php83Extensions.tokenizer",
  "php83Extensions.bcmath",
  "php83Extensions.ctype",
  "php83Extensions.openssl",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=DatabaseSeeder --force && php -S 0.0.0.0:$PORT -t public"
